services:
  # ── FastAPI Web Service ────────────────────────────────────────────────────
  - type: web
    name: autopilot-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually: Supabase connection string
      - key: REDIS_URL
        sync: false          # Set manually: Upstash Redis URL
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
    healthCheckPath: /health

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: autopilot-celery
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.tasks.celery_app worker -l info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
