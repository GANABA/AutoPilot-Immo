<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImmoPlus — Assistant Vocal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
    }

    .header { text-align: center; }
    .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #94a3b8; }

    /* Waveform animation */
    .waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 48px;
    }
    .waveform .bar {
      width: 4px;
      background: #3b82f6;
      border-radius: 2px;
      height: 8px;
      transition: height 0.1s;
    }
    .waveform.active .bar { animation: wave 0.8s ease-in-out infinite; }
    .waveform.active .bar:nth-child(1) { animation-delay: 0s; }
    .waveform.active .bar:nth-child(2) { animation-delay: 0.1s; }
    .waveform.active .bar:nth-child(3) { animation-delay: 0.2s; }
    .waveform.active .bar:nth-child(4) { animation-delay: 0.3s; }
    .waveform.active .bar:nth-child(5) { animation-delay: 0.2s; }
    .waveform.active .bar:nth-child(6) { animation-delay: 0.1s; }
    .waveform.active .bar:nth-child(7) { animation-delay: 0s; }

    @keyframes wave {
      0%, 100% { height: 8px; }
      50%       { height: 36px; }
    }

    /* Main button */
    .mic-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      background: #1d4ed8;
      box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5);
      transition: transform 0.15s, background 0.15s;
      position: relative;
    }
    .mic-btn:hover { transform: scale(1.05); }
    .mic-btn.recording {
      background: #dc2626;
      animation: pulse 1.2s ease-out infinite;
    }
    .mic-btn.processing {
      background: #7c3aed;
      cursor: not-allowed;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
      70%  { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
    }

    .status {
      font-size: 14px;
      color: #94a3b8;
      text-align: center;
      min-height: 20px;
    }
    .status.active { color: #60a5fa; }
    .status.error  { color: #f87171; }

    /* Conversation log */
    .log {
      width: 100%;
      max-width: 480px;
      background: #1e293b;
      border-radius: 16px;
      padding: 16px;
      max-height: 320px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .log:empty::before {
      content: "La conversation apparaîtra ici…";
      color: #475569;
      font-size: 13px;
      text-align: center;
      display: block;
      padding: 16px 0;
    }
    .log .entry { font-size: 13.5px; line-height: 1.5; }
    .log .entry .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .log .entry.user .label  { color: #60a5fa; }
    .log .entry.agent .label { color: #4ade80; }
    .log .entry.user  p { color: #cbd5e1; }
    .log .entry.agent p { color: #e2e8f0; }

    .hint {
      font-size: 12px;
      color: #475569;
      text-align: center;
    }

    /* Audio player */
    #audio-player { display: none; }
  </style>
</head>
<body>

<div class="header">
  <h1>🎙️ Assistant Vocal ImmoPlus</h1>
  <p>Pipeline : Whisper STT → GPT-4o-mini → OpenAI TTS-1</p>
</div>

<div class="waveform" id="waveform">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div>
</div>

<button class="mic-btn" id="mic-btn" title="Cliquer pour parler">🎤</button>

<div class="status" id="status">Cliquez pour parler</div>

<div class="log" id="log"></div>

<p class="hint">🔴 Cliquez pour commencer · Cliquez à nouveau pour envoyer</p>

<audio id="audio-player" autoplay></audio>

<script>
  const API = "http://localhost:8000";

  const micBtn    = document.getElementById("mic-btn");
  const statusEl  = document.getElementById("status");
  const logEl     = document.getElementById("log");
  const waveform  = document.getElementById("waveform");
  const audioEl   = document.getElementById("audio-player");

  let mediaRecorder = null;
  let chunks        = [];
  let isRecording   = false;
  let isProcessing  = false;

  function setStatus(msg, type = "") {
    statusEl.textContent = msg;
    statusEl.className = "status " + type;
  }

  function appendLog(role, text) {
    const entry = document.createElement("div");
    entry.className = "entry " + role;
    entry.innerHTML = `
      <div class="label">${role === "user" ? "Vous" : "Assistant"}</div>
      <p>${text}</p>`;
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;
  }

  micBtn.addEventListener("click", async () => {
    if (isProcessing) return;

    if (!isRecording) {
      // ── Start recording ──────────────────────────────────────────────
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.start();

        isRecording = true;
        micBtn.classList.add("recording");
        micBtn.textContent = "⏹";
        waveform.classList.add("active");
        setStatus("Enregistrement en cours… cliquez pour envoyer", "active");
      } catch (err) {
        setStatus("Microphone inaccessible : " + err.message, "error");
      }

    } else {
      // ── Stop & send ──────────────────────────────────────────────────
      isRecording  = false;
      isProcessing = true;
      micBtn.classList.remove("recording");
      micBtn.classList.add("processing");
      micBtn.textContent = "⏳";
      waveform.classList.remove("active");
      setStatus("Analyse en cours…", "active");

      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());

      // Wait for all chunks
      await new Promise(r => (mediaRecorder.onstop = r));

      const blob = new Blob(chunks, { type: "audio/webm" });
      const formData = new FormData();
      formData.append("file", blob, "recording.webm");

      try {
        const res = await fetch(API + "/voice/chat", {
          method: "POST",
          body: formData,
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || "Erreur " + res.status);
        }

        const transcript   = decodeURIComponent(res.headers.get("X-Transcript")    || "");
        const responseText = decodeURIComponent(res.headers.get("X-Response-Text") || "");

        if (transcript)   appendLog("user",  transcript);
        if (responseText) appendLog("agent", responseText);

        // Play MP3 response
        const audioBlob = await res.blob();
        const url = URL.createObjectURL(audioBlob);
        audioEl.src = url;
        audioEl.onended = () => URL.revokeObjectURL(url);

        setStatus("Cliquez pour parler");

      } catch (err) {
        setStatus("Erreur : " + err.message, "error");
        appendLog("agent", "⚠️ " + err.message);
      } finally {
        isProcessing = false;
        micBtn.classList.remove("processing");
        micBtn.textContent = "🎤";
      }
    }
  });
</script>
</body>
</html>
